<!DOCTYPE html>
<html lang="en" style="scroll-padding-top: 80px;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Studio — Stop Learning AI. Start Building Products.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#f8f9ff',
                        'surface-dim': '#cbdbf5',
                        'surface-bright': '#f8f9ff',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-low': '#eff4ff',
                        'surface-container': '#e5eeff',
                        'surface-container-high': '#dce9ff',
                        'surface-container-highest': '#d3e4fe',
                        'on-surface': '#0b1c30',
                        'on-surface-variant': '#574146',
                        'inverse-surface': '#213145',
                        'inverse-on-surface': '#eaf1ff',
                        outline: '#8a7176',
                        'outline-variant': '#ddbfc5',
                        primary: '#ab2c5d',
                        'on-primary': '#ffffff',
                        'primary-container': '#f06292',
                        'on-primary-container': '#5e002b',
                        'primary-fixed': '#ffd9e1',
                        'primary-fixed-dim': '#ffb1c5',
                        'on-primary-fixed': '#3f001b',
                        'on-primary-fixed-variant': '#8b0e45',
                        secondary: '#565e74',
                        'on-secondary': '#ffffff',
                        'secondary-container': '#dae2fd',
                        'on-secondary-container': '#5c647a',
                        tertiary: '#494bd6',
                        'on-tertiary': '#ffffff',
                        'tertiary-container': '#8387ff',
                        'on-tertiary-container': '#0e009d',
                        error: '#ba1a1a',
                        'on-error': '#ffffff',
                        'error-container': '#ffdad6',
                        'on-error-container': '#93000a',
                        background: '#f8f9ff',
                        'on-background': '#0b1c30',
                        'surface-variant': '#d3e4fe',
                    },
                    borderRadius: {
                        DEFAULT: '0.25rem',
                        lg: '0.5rem',
                        xl: '0.75rem',
                        full: '9999px',
                    },
                    spacing: {
                        'section-gap': '120px',
                        'section-gap-mobile': '72px',
                        'stack-gap': '16px',
                        'margin-x': '32px',
                        'container-max': '1280px',
                        gutter: '24px',
                    },
                    fontFamily: {
                        display: ['Hanken Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                        label: ['Geist', 'monospace'],
                    },
                    fontSize: {
                        'display-xl': ['72px', { lineHeight: '80px', letterSpacing: '-0.04em', fontWeight: '800' }],
                        'display-lg': ['56px', { lineHeight: '64px', letterSpacing: '-0.03em', fontWeight: '800' }],
                        'display-lg-mobile': ['40px', { lineHeight: '48px', letterSpacing: '-0.02em', fontWeight: '800' }],
                        'headline-lg': ['40px', { lineHeight: '48px', letterSpacing: '-0.02em', fontWeight: '700' }],
                        'headline-md': ['32px', { lineHeight: '40px', fontWeight: '700' }],
                        'body-lg': ['18px', { lineHeight: '28px', fontWeight: '400' }],
                        'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
                        'label-md': ['14px', { lineHeight: '20px', letterSpacing: '0.05em', fontWeight: '600' }],
                    },
                },
            },
        }
    </script>
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #f8f9ff;
            color: #0b1c30;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #eff4ff; }
        ::-webkit-scrollbar-thumb { background: #d3e4fe; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ab2c5d; }

        html { scroll-behavior: smooth; }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(240, 98, 146, 0.06), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(73, 75, 214, 0.04), transparent 40%);
        }

        @keyframes ambientFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(0.5deg); }
        }
        .hero-float { animation: ambientFloat 6s ease-in-out infinite; }

        nav.scrolled {
            background-color: rgba(248, 249, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom-color: rgba(138, 113, 118, 0.2) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .btn-shimmer { position: relative; overflow: hidden; }
        .btn-shimmer::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: translateX(-100%);
            animation: shimmer 2.4s infinite;
        }

        .curriculum-line {
            height: 0;
            transition: height 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (prefers-reduced-motion: reduce) {
            .hero-float, .btn-shimmer::after {
                animation: none !important;
            }
        }

        /* Masterclass page marquee */
        @keyframes marqueeScroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        .marquee-track {
            display: flex;
            width: max-content;
            animation: marqueeScroll 40s linear infinite;
        }
        .marquee-track:hover { animation-play-state: paused; }
        @media (prefers-reduced-motion: reduce) {
            .marquee-track { animation: none !important; }
        }
    </style>
