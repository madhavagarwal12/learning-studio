<!DOCTYPE html>
<html lang="en" style="scroll-padding-top: 80px;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Studio | Live AI Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #ffffff;
            color: #111111;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f5f5f5; }
        ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }

        .nohemi-thin    { font-weight: 300; }
        .nohemi-light   { font-weight: 300; }
        .nohemi-regular { font-weight: 400; }
        .nohemi-medium  { font-weight: 500; }
        .nohemi-semibold{ font-weight: 600; }
        .nohemi-bold    { font-weight: 700; }
        .nohemi-extrabold { font-weight: 800; }
        .nohemi-black   { font-weight: 900; }

        .jetbrains { font-family: 'JetBrains Mono', monospace; }

        html { scroll-behavior: smooth; }

        .btn-primary {
            background: #f472b6;
            color: #ffffff;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            background: #ec4899;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(244, 114, 182, 0.25);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-ghost {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.12);
            color: #111111;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }
        .btn-ghost:hover {
            border-color: rgba(0, 0, 0, 0.25);
            background: #f9f9f9;
            transform: translateY(-1px);
        }

        .card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
        }
        .card:hover {
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.09);
            transform: translateY(-3px);
            border-color: rgba(0, 0, 0, 0.13);
        }

        .section-alt { background: #f8f8f8; }
        .section-dark { background: #0c0c14; }

        .divider { border-top: 1px solid rgba(0, 0, 0, 0.07); }

        @keyframes live-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }
        .live-dot { animation: live-pulse 2.2s ease-in-out infinite; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
