<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Studio | Live AI Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/nohemi" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f8f8;
            --accent: #8B1538;
            --accent-hover: #A0153E;
            --text-primary: #111111;
            --text-secondary: #555555;
            --border-color: rgba(0, 0, 0, 0.08);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Nohemi', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #cccccc;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .nohemi-thin { font-weight: 200; }
        .nohemi-light { font-weight: 300; }
        .nohemi-regular { font-weight: 400; }
        .nohemi-medium { font-weight: 500; }
        .nohemi-bold { font-weight: 700; }
        .nohemi-extrabold { font-weight: 800; }
        .nohemi-black { font-weight: 900; }

        html {
            scroll-behavior: smooth;
        }
    </style>
